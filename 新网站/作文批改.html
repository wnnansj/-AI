<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 作文批改 - 衡水助学AI</title>
    <style>
        /* ==================== 全局样式 (复用首页变量) ==================== */
        :root {
            --primary-color: #0066cc;
            --bg-color: #f9fbfd;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --error-color: #ef4444;
            --success-color: #10b981;
            --warning-color: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        header {
            background: white;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 16px;
        }

        .page-title {
            font-size: 18px;
            font-weight: bold;
        }

        /* 主体容器 */
        .main-container {
            flex: 1;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* 左右分栏 */
            gap: 30px;
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 输入区 */
        textarea {
            width: 100%;
            height: 400px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .action-bar {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        /* 结果展示区 */
        .result-content {
            flex: 1;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.8;
        }

        .score-box {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 8px;
        }

        .score-num {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .score-label {
            font-size: 14px;
            color: var(--text-sub);
        }

        .section-title {
            font-weight: bold;
            margin: 15px 0 8px;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: var(--primary-color);
            margin-right: 8px;
            border-radius: 2px;
        }

        /* 高亮样式 */
        .highlight-error {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 0 4px;
            border-radius: 4px;
            text-decoration: line-through;
            position: relative;
            cursor: help;
        }

        .highlight-error::after {
            content: attr(data-correction);
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .highlight-error:hover::after {
            opacity: 1;
        }

        .suggestion-item {
            background: #fffbeb;
            border-left: 3px solid var(--warning-color);
            padding: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        /* 加载动画 */
        .loading-state {
            display: none;
            text-align: center;
            padding: 50px 0;
            color: var(--text-sub);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            textarea {
                height: 250px;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="page-title">AI 作文智能批改</div>
        <div style="width: 60px;"></div>
    </header>

    <div class="main-container">
        <!-- 左侧：输入区 -->
        <div class="card">
            <div class="card-header">
                <span>📝 请输入您的作文</span>
                <span style="font-size: 12px; color: #94a3b8;">支持中文/英文</span>
            </div>
            <textarea id="essay-input"
                placeholder="请在此处粘贴或输入您的作文内容...&#10;&#10;示例：&#10;首先，我们要努力学习。&#10;其次，我们要锻炼身体。&#10;最后，我们要报效祖国。&#10;（试着写一段包含'在再'混淆或结构简单的文字）"></textarea>
            <div class="action-bar">
                <button id="check-btn" class="btn-primary">开始批改</button>
            </div>
        </div>

        <!-- 右侧：结果区 -->
        <div class="card">
            <div class="card-header">
                <span>🤖 批改报告</span>
            </div>

            <!-- 加载状态 -->
            <div id="loading" class="loading-state">
                <div class="spinner"></div>
                <p>AI 正在深度阅读与分析...</p>
            </div>

            <!-- 结果内容 (初始隐藏) -->
            <div id="result-content" class="result-content" style="display: none;">
                <div class="score-box">
                    <div class="score-num" id="score-display">--</div>
                    <div class="score-label">综合评分 (满分 60)</div>
                </div>

                <div class="section-title">🔍 错别字与语法纠正</div>
                <div id="correction-list">
                    <!-- 动态插入 -->
                </div>

                <div class="section-title">💡 结构与内容建议</div>
                <div id="suggestion-list">
                    <!-- 动态插入 -->
                </div>

                <div class="section-title">✨ 润色后的开头示例</div>
                <div id="polish-example" style="color: var(--text-sub); font-style: italic; font-size: 14px;">
                    <!-- 动态插入 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const checkBtn = document.getElementById('check-btn');
        const essayInput = document.getElementById('essay-input');
        const loading = document.getElementById('loading');
        const resultContent = document.getElementById('result-content');

        // 模拟错别字库
        const typoMap = {
            "在再": "再", "在见": "再见", "以经": "已经", "须要": "需要",
            "做为": "作为", "象是": "像是", "那里": "哪里", "那末": "那么",
            "帐号": "账号", "登路": "登录", "权宜": "权益"
        };

        checkBtn.addEventListener('click', () => {
            const text = essayInput.value.trim();
            if (!text) {
                alert("请先输入作文内容！");
                return;
            }

            // 1. 显示加载，隐藏结果
            resultContent.style.display = 'none';
            loading.style.display = 'block';
            checkBtn.disabled = true;

            // 2. 模拟延迟 (1.5秒)
            setTimeout(() => {
                const report = analyzeEssay(text);
                renderReport(report);

                loading.style.display = 'none';
                resultContent.style.display = 'block';
                checkBtn.disabled = false;
            }, 1500);
        });

        // 核心模拟分析逻辑
        function analyzeEssay(text) {
            let score = 45; // 基础分
            let corrections = [];
            let suggestions = [];
            let polish = "";

            // A. 错别字检测 (简单模拟)
            for (let wrong in typoMap) {
                if (text.includes(wrong)) {
                    corrections.push({
                        original: wrong,
                        fixed: typoMap[wrong],
                        context: `检测到疑似错别字："${wrong}"`
                    });
                    score -= 2;
                }
            }
            if (corrections.length === 0) {
                corrections.push({ original: "无", fixed: "很棒", context: "未发现明显错别字，继续保持！" });
                score += 2;
            }

            // B. 结构检测 (关键词匹配)
            const hasStructure = ["首先", "其次", "最后", "第一", "第二", "总之", "综上所述"].some(k => text.includes(k));
            const hasIntro = ["随着", "当今", "近年来", "在这个"].some(k => text.includes(k));

            if (!hasStructure) {
                suggestions.push("⚠️ <strong>结构建议：</strong>文章缺乏明显的逻辑连接词（如'首先'、'其次'、'总之'），建议添加以增强条理性。");
                score -= 5;
            } else {
                suggestions.push("✅ <strong>结构评价：</strong>文章使用了逻辑连接词，层次较为清晰。");
            }

            if (!hasIntro && text.length > 50) {
                suggestions.push("⚠️ <strong>开头建议：</strong>开头略显平淡，建议尝试用'随着...'或引用名言来引入主题，增加吸引力。");
                score -= 3;
            }

            // C. 字数检测
            if (text.length < 100) {
                suggestions.push("⚠️ <strong>字数提醒：</strong>当前字数较少，可能无法充分展开论述，建议扩充至 800 字以上。");
                score -= 5;
            }

            // D. 生成润色示例 (硬编码模拟)
            polish = "原句可能较为直白。建议修改为：'在当今瞬息万变的时代背景下，我们不仅需要具备扎实的专业知识，更应拥有广阔的视野与坚韧的品格……'";

            // 限制分数范围
            score = Math.max(0, Math.min(60, score));

            return { score, corrections, suggestions, polish };
        }

        // 渲染结果
        function renderReport(data) {
            // 1. 分数
            document.getElementById('score-display').innerText = data.score;

            // 2. 纠错列表
            const corrList = document.getElementById('correction-list');
            corrList.innerHTML = data.corrections.map(item => {
                if (item.original === "无") {
                    return `<div style="color: var(--success-color); margin-bottom: 8px;">✅ ${item.context}</div>`;
                }
                return `
                    <div style="margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 5px;">
                        <span class="highlight-error" data-correction="${item.fixed}">${item.original}</span>
                        <span style="font-size: 13px; color: #666; margin-left: 8px;">→ 建议改为：<strong>${item.fixed}</strong></span>
                    </div>
                `;
            }).join('');

            // 3. 建议列表
            const suggList = document.getElementById('suggestion-list');
            suggList.innerHTML = data.suggestions.map(s =>
                `<div class="suggestion-item">${s}</div>`
            ).join('');

            // 4. 润色示例
            document.getElementById('polish-example').innerText = data.polish;
        }
    </script>
</body>

</html>
